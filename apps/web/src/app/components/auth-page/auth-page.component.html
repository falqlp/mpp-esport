<mat-card appearance="outlined"
  ><mat-card-header
    ><mat-card-subtitle>{{ 'auth.playerAccount' | translate }}</mat-card-subtitle
    ><mat-card-title>{{
      (mode === 'login' ? 'auth.login' : 'auth.createAccount') | translate
    }}</mat-card-title></mat-card-header
  ><mat-card-content
    ><form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline"
        ><mat-label>Email</mat-label><input matInput type="email" formControlName="email" autocomplete="email"
      /></mat-form-field>
      @if (mode === 'register') {
        <mat-form-field appearance="outline"
          ><mat-label>{{ 'auth.displayName' | translate }}</mat-label
          ><input matInput formControlName="displayName" autocomplete="nickname"
        /></mat-form-field>
      }
      <mat-form-field appearance="outline"
        ><mat-label>{{ 'auth.password' | translate }}</mat-label
        ><input matInput type="password" formControlName="password" autocomplete="current-password" /></mat-form-field
      ><button mat-flat-button type="submit" [disabled]="loading">
        {{ (loading ? 'auth.wait' : mode === 'login' ? 'auth.login' : 'auth.register') | translate }}</button
      ><button mat-button type="button" (click)="mode = mode === 'login' ? 'register' : 'login'">
        {{ (mode === 'login' ? 'auth.createAccount' : 'auth.existingAccount') | translate }}
      </button>
    </form></mat-card-content
  ></mat-card
>
