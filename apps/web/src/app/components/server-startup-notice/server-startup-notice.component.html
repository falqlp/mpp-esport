@if (visible) {
  <mat-card appearance="outlined" class="notice" role="status">
    <mat-card-content>
      <span>{{ 'app.serverStartupNotice' | translate }}</span>
      <button mat-button type="button" (click)="dismiss()">
        {{ 'common.close' | translate }}
      </button>
    </mat-card-content>
  </mat-card>
}
